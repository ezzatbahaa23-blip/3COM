// ══ قراءة البيانات ══
async function loadAllData(){
  try {
    const [recRes, usersRes, modelsRes] = await Promise.all([
      _sb.from('records').select('*').order('id'),
      _sb.from('config').select('*').eq('key','users').single(),
      _sb.from('config').select('*').eq('key','customModels').single()
    ]);
    if(recRes.data){ window.records = recRes.data; if(records.length) window.nextId=Math.max(...records.map(r=>r.id))+1; }
    if(usersRes.data?.value) window.USERS = usersRes.data.value;
    if(modelsRes.data?.value) window.__customModels = modelsRes.data.value;
    window.__sbConnected = true;
    console.log('✅ Supabase loaded:', window.records.length, 'records');
  } catch(e){ console.error('❌ Supabase load error:', e.message); }
}

// ══ حفظ record ══
async function saveRecordsToStore(rec){
  const {error} = await _sb.from('records').upsert(rec, {onConflict:'id'});
  if(error) throw error;
}

// ══ حذف record ══
async function deleteRecordFromStore(id){
  const {error} = await _sb.from('records').delete().eq('id',id);
  if(error) throw error;
}

// ══ حفظ المستخدمين ══
async function saveUsersToStore(){
  await _sb.from('config').upsert({key:'users', value:window.USERS},{onConflict:'key'});
}

// ══ حفظ الموديلات ══
async function saveCustomModelToStore(brand,model){
  const cm = window.__customModels||{};
  if(!cm[brand]) cm[brand]=[];
  if(!cm[brand].includes(model)){ cm[brand].push(model); window.__customModels=cm; }
  await _sb.from('config').upsert({key:'customModels', value:cm},{onConflict:'key'});
}

// ══ real-time updates ══
function startRealtimeSync(){
  _sb.channel('records-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'records'},()=>{
      loadAllData().then(()=>{
        if(window.currentUser){
          if(typeof renderDashboard==='function') renderDashboard();
          if(typeof renderTable==='function') renderTable();
          if(typeof renderDeliveryTable==='function') renderDeliveryTable();
        }
      });
    }).subscribe();
}

// ══ تهيئة عند تحميل الصفحة ══

function onNameAC(val){
  const list=document.getElementById('name-ac-list');
  if(!val||val.length<1){list.classList.remove('open');return;}
  const seen=new Map();
  records.forEach(r=>{
    if(r.name.includes(val)&&!seen.has(r.name))seen.set(r.name,{phone:r.phone,model:(r.model||'')+(r.variant?' '+r.variant:'')});
  });
  if(!seen.size){list.classList.remove('open');return;}
  list.innerHTML=[...seen.entries()].slice(0,7).map(([n,d])=>
    `<div class="name-ac-item" onclick="pickAcName('${n.replace(/'/g,"\\'")}','${d.phone}')">
      <span>${n}</span><span class="name-ac-sub">${d.phone} | ${d.model}</span>
    </div>`).join('');
  list.classList.add('open');
}

// ═══════════════ EXPORT EXCEL ═══════════════
function exportExcel(){
  const from=document.getElementById('exp-from').value;
  const to=document.getElementById('exp-to').value;
  let data=records;
  if(from)data=data.filter(r=>r.recvdate>=from);
  if(to)data=data.filter(r=>r.recvdate<=to);
  if(!data.length){showToast('⚠️ لا توجد بيانات في هذا النطاق الزمني');return;}
  const headers=['كود العميل','#','اسم العميل','الماركة','الموديل','رقم التليفون','التكلفة','التكلفة النهائية','الشكوى','تاريخ الاستلام','تاريخ التسليم المتوقع','تاريخ التسليم الفعلي','موظف الاستلام','موظف التسليم','ملاحظات الفني','الحالة'];
  const rows=data.map(r=>[
    r.custCode||'',r.id,r.name,r.model||'',r.variant||'',r.phone,
    r.cost||'0',r.finalCost||'',
    '"'+(r.complaint||'').replace(/"/g,'""')+'"',
    r.recvdate,r.deldate||'',r.deliveredAt||'',
    r.recvstaff,r.delstaff||'',
    '"'+(r.inspection||'').replace(/"/g,'""')+'"',
    sL(r.status)
  ]);
  const csv='\uFEFF'+[headers,...rows].map(row=>row.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  const label=from&&to?`${from}_${to}`:new Date().toISOString().slice(0,10);
  a.download=`3com_عملاء_${label}.csv`;
  a.click();URL.revokeObjectURL(url);
  showToast(`✅ تم تصدير ${data.length} سجل`);
}

// ── Firebase save record ──
async function saveRecordsToStore(rec){
  try{
    await db.collection('records').doc(String(rec.id)).set(rec);
    console.log('✅ Record saved:', rec.id);
  } catch(e){
    console.error('❌ Save error:', e.code, e.message);
    if(e.code==='permission-denied'){
      alert('⚠️ Firebase رفض الحفظ!\nيرجى:\n1. فتح Firebase Console\n2. Firestore → Rules\n3. تأكد من وجود: allow read, write: if true\n4. اضغط Publish');
    }
    throw e;
  }
}
// ── Firebase delete record ──
async function deleteRecordFromStore(id){
  await db.collection('records').doc(String(id)).delete();
}
// ── Firebase save users ──
async function saveUsersToStore(){
  await db.collection('config').doc('users').set(window.USERS);
}
// ── Firebase save custom model ──
async function saveCustomModelToStore(brand,model){
  const ref=db.collection('config').doc('customModels');
  const snap=await ref.get();
  const data=snap.exists?snap.data():{};
  if(!data[brand])data[brand]=[];
  if(!data[brand].includes(model)){data[brand].push(model);await ref.set(data);}
}

function saveCustomModel(brand,model){
  if(!brand||!model)return;
  if(BRAND_MODELS[brand]&&BRAND_MODELS[brand].includes(model))return;
  const key='3com_custmodels_'+brand;
  const saved=localStorage.getItem(key);const arr=saved?JSON.parse(saved):[];
  if(!arr.includes(model)){arr.push(model);localStorage.setItem(key,JSON.stringify(arr));}
}

// ═══════════════ CUSTOMER CODE & DEVICE CODE ═══════════════
// كود العميل: 3C-XXXXXX (رقم تسلسلي 6 أرقام)
function genCustCode(){
  const usedCodes=new Set(records.map(r=>r.custCode).filter(Boolean));
  let n=records.length+1;
  let code;
  do{code='3C-'+String(n).padStart(6,'0');n++;}while(usedCodes.has(code));
  return code;
}

// توليد كود العميل عند فتح فورم جديد
function assignNewCustCode(){
  if(editId!==null)return;
  document.getElementById('f-custcode').value=genCustCode();
}

// ═══════════════ SAVE / EDIT / DELETE ═══════════════
function saveRecord(){
  const name=document.getElementById('f-name').value.trim();
  const phone=document.getElementById('f-phone').value.trim();
  const model=document.getElementById('f-model').value.trim();
  const variant=document.getElementById('f-variant').value.trim();
  const cost=document.getElementById('f-cost').value.trim();
  const complaint=document.getElementById('f-complaint').value.trim();
  const recvdate=document.getElementById('f-recvdate').value;
  const deldate=document.getElementById('f-deldate').value;
  const recvstaff=document.getElementById('f-recvstaff').value;
  const missing=[];
  if(!name)missing.push('اسم العميل');
  if(!phone)missing.push('رقم التليفون');
  if(!model)missing.push('نوع الجهاز (الماركة)');
  if(!variant)missing.push('الموديل');
  if(!cost)missing.push('تكلفة الإصلاح');
  if(!complaint)missing.push('الشكوى');
  if(!recvdate)missing.push('تاريخ الاستلام');
  if(!deldate)missing.push('تاريخ التسليم المتوقع');
  if(!recvstaff)missing.push('موظف الاستلام');
  if(missing.length){showToast('⚠️ يرجى ملء: '+missing.join(' | '));return;}
  saveCustomModel(model,variant);
  const custCode=editId!==null?(records.find(r=>r.id===editId)||{}).custCode||genCustCode():document.getElementById('f-custcode').value||genCustCode();
  const rec={
    id:editId!==null?editId:nextId++,
    custCode,
    name,phone,model,variant,
    cost:cost||'0',finalCost:'',
    complaint,recvdate,deldate:deldate,
    recvstaff,delstaff:'',
    status:'فحص',locked:false,inspection:''
  };
  let editId_was=editId;
  if(editId!==null){
    const idx=records.findIndex(r=>r.id===editId);const old=records[idx];
    rec.finalCost=old.finalCost||'';rec.locked=old.locked||false;rec.inspection=old.inspection||'';rec.status=old.status;
    records[idx]=rec;editId=null;
  }else{records.push(rec);}
  showLoading('جاري الحفظ...');
  saveRecordsToStore(rec).then(()=>{hideLoading();clearForm();switchTab('list');showToast(editId_was!==null?'✏️ تم تعديل الطلب':'✅ تم حفظ الطلب');}).catch(e=>{hideLoading();showToast('⚠️ خطأ في الحفظ: '+e.message);});
}
function triggerEdit(){if(editId!==null)saveRecord();else showToast('اختر طلباً من القائمة للتعديل');}
function clearForm(){
  ['f-name','f-phone','f-cost','f-complaint','f-recvdate','f-deldate'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-recvstaff').value='';
  document.getElementById('f-recvdate').value=new Date().toISOString().slice(0,10);
  updateDelDateMin();
  document.getElementById('f-status').value='فحص';editId=null;
  document.getElementById('form-title').textContent='إضافة طلب جديد';
  document.getElementById('phone-hint').style.display='none';
  document.getElementById('name-ac-list').classList.remove('open');
  assignNewCustCode();
  // reset brand
  brandCtx.f=null;
  document.getElementById('f-model-display').textContent='— اختر الماركة —';
  document.getElementById('f-model').value='';
  document.getElementById('f-variant').value='';document.getElementById('f-variant').disabled=true;document.getElementById('f-variant').placeholder='اختر الماركة أولاً...';
  document.querySelectorAll('#brand-grid-f .brand-item').forEach(el=>el.classList.remove('selected'));
  document.querySelectorAll('.model-ac-list').forEach(l=>l.classList.remove('open'));
}
function setStatus(id,s){
  const r=records.find(r=>r.id===id);if(!r)return;
  if(s==='تسليم'){openDeliveryModal(id);return;}
  r.status=s;saveRecordsToStore(r).then(()=>showToast('تم تغيير الحالة')).catch(e=>showToast('⚠️ '+e.message));
  showToast('تم تغيير الحالة: '+sL(s));
}
function editRecord(id){
  const rec=records.find(r=>r.id===id);if(!rec)return;
  if(rec.locked){openUnlockModal(id);return;}
  editId=id;
  document.getElementById('f-name').value=rec.name;document.getElementById('f-phone').value=rec.phone;
  // set brand
  brandCtx.f=rec.model;
  document.getElementById('f-model-display').textContent=rec.model||'— اختر الماركة —';
  document.getElementById('f-model').value=rec.model||'';
  document.querySelectorAll('#brand-grid-f .brand-item').forEach(el=>{el.classList.toggle('selected',el.textContent===rec.model);});
  const vi=document.getElementById('f-variant');vi.disabled=!rec.model;vi.value=rec.variant||'';if(rec.model)vi.placeholder='اكتب للبحث في '+rec.model+'...';
  document.getElementById('f-cost').value=rec.cost;document.getElementById('f-complaint').value=rec.complaint;
  document.getElementById('f-recvdate').value=rec.recvdate;document.getElementById('f-deldate').value=rec.deldate||'';
  document.getElementById('f-recvstaff').value=rec.recvstaff;
  document.getElementById('f-status').value=rec.status;
  document.getElementById('form-title').textContent='تعديل الطلب رقم '+id;
  switchTab('add');
}
function deleteRecord(id){
  const r=records.find(r=>r.id===id);
  if(r&&r.locked){openUnlockModal(id);showToast('افتح القفل أولاً');return;}
  if(confirm('حذف هذا الطلب؟')){showLoading('جاري الحذف...');deleteRecordFromStore(id).then(()=>{hideLoading();showToast('تم الحذف');}).catch(e=>{hideLoading();showToast('⚠️ خطأ: '+e.message);});}
}

  r.phone=document.getElementById('d-phone').value.trim()||r.phone;

  r.variant=document.getElementById('d-variant').value.trim();

  r.finalCost=document.getElementById('d-finalcost').value||'';
  r.complaint=document.getElementById('d-complaint').value.trim()||r.complaint;
  r.recvdate=document.getElementById('d-recvdate').value||r.recvdate;
  r.deldate=document.getElementById('d-deldate').value||'';
  r.recvstaff=document.getElementById('d-recvstaff').value||r.recvstaff;
  r.delstaff=document.getElementById('d-delstaff').value||'';

function tryUnlock(){
  const pass=document.getElementById('unlock-pass').value;const err=document.getElementById('unlock-err');
  if(USERS[MANAGER_USER]&&pass===USERS[MANAGER_USER]){
    const id=pendingUnlockId;closeUnlockModal();
    const r=records.find(r=>r.id===id);if(r){r.locked=false;saveRecordsToStore(r).then(()=>showToast('تم فتح القفل')).catch(e=>showToast('⚠️ '+e.message));}

}

// ═══════════════ RENDER TABLE ═══════════════
function renderTable(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  const sf=document.getElementById('filter-status').value;
  const filtered=records.filter(r=>(!q||r.name.toLowerCase().includes(q)||(r.model||'').toLowerCase().includes(q)||r.phone.includes(q))&&(!sf||r.status===sf));
  const tbody=document.getElementById('main-tbody');
  if(!filtered.length){tbody.innerHTML='<tr><td colspan="14" class="empty-state">لا توجد بيانات</td></tr>';return;}
  tbody.innerHTML=filtered.map(r=>{
    const isLocked=r.locked||r.status==='تسليم';
    const fc=r.finalCost?`<span class="final-cost-badge">${r.finalCost} ج</span>`:'-';
    const btns=isLocked
      ?`<button class="btn-locked" onclick="openUnlockModal(${r.id})">🔒 مقفول</button>`
      :`<button class="btn-status btn-فحص" onclick="setStatus(${r.id},'فحص')">فحص</button>
        <button class="btn-status btn-انتهى" onclick="setStatus(${r.id},'انتهى')">انتهى</button>
        <button class="btn-status btn-رفض" onclick="setStatus(${r.id},'رفض')">رفض</button>`;
    return`<tr>
      <td style="color:#90b8e8;font-size:10px;">${r.id}</td>
      <td style="font-weight:700;">${r.name}</td><td>${r.model||'-'}</td><td>${r.variant||'-'}</td><td>${r.phone}</td>
      <td>${r.cost?r.cost+' ج':'-'}</td><td>${fc}</td>
      <td style="max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${r.complaint}">${r.complaint}</td>
      <td style="font-size:10px;">${r.recvdate}</td><td style="font-size:10px;">${r.deldate||'-'}</td>
      <td>${r.recvstaff}</td><td>${r.delstaff||'-'}</td>
      <td><span class="status-badge s-${r.status}">${sL(r.status)}</span></td>
      <td><div class="action-btns">${btns}</div></td>
    </tr>`;
  }).join('');
}

// ═══════════════ DASHBOARD ═══════════════
function renderDashboard(){
  const t=records.length,f=records.filter(r=>r.status==='فحص').length,d=records.filter(r=>r.status==='انتهى').length,rj=records.filter(r=>r.status==='رفض').length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="stat-label">إجمالي الطلبات</div><div class="stat-num blue">${t}</div></div>
    <div class="stat-card"><div class="stat-label">قيد الفحص</div><div class="stat-num amber">${f}</div></div>
    <div class="stat-card"><div class="stat-label">تم الانتهاء</div><div class="stat-num green">${d}</div></div>
    <div class="stat-card"><div class="stat-label">تم الرفض</div><div class="stat-num red">${rj}</div></div>`;
  if(!document.getElementById('range-from').value){
    const now=new Date();
    document.getElementById('range-from').value=new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10);
    document.getElementById('range-to').value=now.toISOString().slice(0,10);
  }

  document.getElementById('dash-tbody').innerHTML=recent.length?recent.map(r=>`<tr>
    <td style="color:#90b8e8;font-size:10px;">${r.id}</td>
    <td style="font-weight:700;">${r.name}</td><td>${r.model||'-'}</td><td>${r.variant||'-'}</td>
    <td style="font-size:10px;">${r.recvdate}</td>

  </tr>`).join(''):'<tr><td colspan="7" class="empty-state">لا توجد طلبات حتى الآن</td></tr>';
  // تحديث جدول المستخدمين للمدير
  if(currentUser===MANAGER_USER)renderUsersTable();
}

function calcRangeCost(){
  const from=document.getElementById('range-from').value;const to=document.getElementById('range-to').value;
  if(!from||!to){showToast('يرجى تحديد تاريخ البداية والنهاية');return;}
  const total=records.filter(r=>r.recvdate>=from&&r.recvdate<=to).reduce((sum,r)=>{const c=parseFloat(r.finalCost||r.cost||0);return sum+(isNaN(c)?0:c);},0);
  const el=document.getElementById('range-total');
  el.textContent='💰 '+total.toLocaleString('ar-EG')+' جنيه';el.style.display='block';
}

// ═══════════════ HELPERS ═══════════════
function sL(s){if(s==='فحص')return'قيد الفحص';if(s==='انتهى')return'تم الانتهاء';if(s==='رفض')return'تم الرفض';if(s==='تسليم')return'تم التسليم';return s;}

// ═══════════════ DATE MIN ENFORCEMENT ═══════════════
function updateDelDateMin(){
  const rv=document.getElementById('f-recvdate').value;
  const dd=document.getElementById('f-deldate');
  if(rv){
    dd.min=rv;
    if(dd.value&&dd.value<rv)dd.value='';
  }
}
function enforceDelDate(){
  const rv=document.getElementById('f-recvdate').value;
  const dd=document.getElementById('f-deldate');
  if(rv&&dd.value&&dd.value<rv){dd.value='';showToast('⚠️ تاريخ التسليم لا يمكن أن يكون قبل تاريخ الاستلام');}
}

// ═══════════════ CHANGE PASSWORD ═══════════════
function openChgPassModal(){
  ['cp-old','cp-new','cp-confirm'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('cp-err').style.display='none';
  document.getElementById('chgpass-modal').classList.add('open');
}
function closeChgPassModal(){document.getElementById('chgpass-modal').classList.remove('open');}
function doChangePassword(){
  const old=document.getElementById('cp-old').value;
  const nw=document.getElementById('cp-new').value;
  const cf=document.getElementById('cp-confirm').value;
  const err=document.getElementById('cp-err');
  if(!old||!nw||!cf){err.textContent='يرجى ملء جميع الحقول';err.style.display='block';return;}
  if(USERS[currentUser]!==old){err.textContent='كلمة المرور الحالية غير صحيحة';err.style.display='block';return;}
  if(nw.length<4){err.textContent='كلمة المرور الجديدة قصيرة جداً (4 أحرف على الأقل)';err.style.display='block';return;}
  if(nw!==cf){err.textContent='كلمة المرور الجديدة غير متطابقة';err.style.display='block';return;}
  USERS[currentUser]=nw;
  saveUsersToStore().catch(e=>console.error(e));
  closeChgPassModal();
  showToast('✅ تم تغيير كلمة المرور بنجاح');
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function switchTab(tab){
  const tabs=['dashboard','add','delivery','list'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',tabs[i]===tab));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  // حفظ التبويب الحالي
  if(window.currentUser){localStorage.setItem('3com_tab',tab);}
  if(tab==='dashboard')renderDashboard();
  if(tab==='list')renderTable();
  if(tab==='delivery')renderDeliveryTable();
}

// ═══════════════ USERS PANEL TOGGLE ═══════════════
function toggleUsersPanel(){
  const body=document.getElementById('users-panel-body');
  const badge=document.getElementById('users-panel-badge');
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  badge.textContent=isOpen?'▼ فتح':'▲ إغلاق';
}
function openManageModal(){
  if(currentUser===MANAGER_USER){
    switchTab('dashboard');
    const body=document.getElementById('users-panel-body');
    body.classList.add('open');
    document.getElementById('users-panel-badge').textContent='▲ إغلاق';
    setTimeout(()=>document.getElementById('users-panel').scrollIntoView({behavior:'smooth'}),100);
  }
}
function closeManageModal(){
  const el=document.getElementById('manage-modal');
  if(el)el.classList.remove('open');
}

// ═══════════════ CONNECTION MONITOR ═══════════════
function updateConnDot(){
  const dot=document.getElementById('conn-dot');if(!dot)return;
  if(navigator.onLine){dot.className='conn-dot online';dot.title='متصل بالإنترنت';}
  else{dot.className='conn-dot offline';dot.title='غير متصل — يعمل بالبيانات المحلية';}
}
window.addEventListener('online',updateConnDot);
window.addEventListener('offline',updateConnDot);
updateConnDot();

// ═══════════════ SESSION RESTORE ON REFRESH ═══════════════
(function restoreSession(){
  const savedUser = localStorage.getItem('3com_user');
  const savedTab  = localStorage.getItem('3com_tab') || 'dashboard';
  if(!savedUser) return;

  // شاشة تحميل جميلة
  const loginEl = document.getElementById('login-screen');
  if(loginEl){
    loginEl.style.cssText='display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(160deg,#0a1e3d 0%,#1a3a6b 50%,#8b1a1a 100%);';
    loginEl.innerHTML = `<div style="text-align:center;color:#fff;font-family:Segoe UI,Arial,sans-serif;">
      <div style="display:flex;align-items:flex-end;justify-content:center;gap:0;margin-bottom:16px;">
        <span style="font-size:100px;font-weight:900;color:#e74c3c;line-height:1;font-family:Arial Black,Impact,sans-serif;">3</span>
        <span style="font-size:58px;font-weight:800;color:#fff;letter-spacing:4px;line-height:1;padding-bottom:8px;font-family:Arial Black,Impact,sans-serif;">com</span>
      </div>
      <div id="load-msg" style="font-size:14px;color:rgba(255,255,255,.75);margin-bottom:18px;">جاري تحميل البيانات...</div>
      <div style="width:44px;height:44px;border:4px solid rgba(255,255,255,.2);border-top-color:#e74c3c;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;"></div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>`;
  }

  function enterApp(){
    currentUser = savedUser;
    window.currentUser = savedUser;
    showApp(savedUser, savedTab);
    setTimeout(()=>{
      if(typeof renderDashboard==='function') renderDashboard();
      if(typeof renderTable==='function') renderTable();
      if(typeof renderDeliveryTable==='function') renderDeliveryTable();
      if(typeof switchTab==='function') switchTab(savedTab);
    }, 500);
  }

  function showLoginScreen(){
    localStorage.removeItem('3com_user');
    localStorage.removeItem('3com_tab');
    if(loginEl){
      loginEl.style.cssText='display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(160deg,#0a1e3d 0%,#1a3a6b 50%,#8b1a1a 100%);';
      loginEl.innerHTML = `<div class="login-card" style="background:#fff;border-radius:22px;width:100%;max-width:820px;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.55);">
        <div style="background:linear-gradient(175deg,rgba(255,255,255,.07),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.13);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;gap:10px;">
          <div style="display:flex;align-items:flex-end;gap:0;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:14px 28px;">
            <span style="font-size:100px;font-weight:900;color:#e74c3c;line-height:1;font-family:Arial Black,sans-serif;">3</span>
            <span style="font-size:58px;font-weight:800;color:#fff;letter-spacing:4px;line-height:1;padding-bottom:8px;font-family:Arial Black,sans-serif;">com</span>
          </div>
          <div style="width:90px;height:2px;background:linear-gradient(90deg,transparent,#e74c3c,#2563a8,transparent);"></div>
          <div style="font-size:11px;color:rgba(255,255,255,.7);letter-spacing:3px;text-transform:uppercase;">Mobile Repair System</div>
        </div>
        <div style="background:#fff;padding:2.8rem 2.2rem;display:flex;flex-direction:column;justify-content:center;">
          <div style="font-size:20px;font-weight:800;color:#1a3a6b;margin-bottom:4px;">مرحباً بك 👋</div>
          <div style="font-size:12px;color:#5b82b8;margin-bottom:1.6rem;">سجّل دخولك للمتابعة</div>
          <label style="font-size:11px;font-weight:700;color:#1a3a6b;margin-bottom:4px;display:block;">اسم المستخدم</label>
          <input id="ri-user" type="text" placeholder="مثال: Bahaa" style="width:100%;padding:10px 13px;font-size:13px;border:1.5px solid #c5d8f0;border-radius:9px;background:#f5f9ff;color:#1a3a6b;margin-bottom:10px;direction:rtl;"/>
          <label style="font-size:11px;font-weight:700;color:#1a3a6b;margin-bottom:4px;display:block;">كلمة المرور</label>
          <input id="ri-pass" type="password" placeholder="كلمة المرور" style="width:100%;padding:10px 13px;font-size:13px;border:1.5px solid #c5d8f0;border-radius:9px;background:#f5f9ff;color:#1a3a6b;direction:rtl;"/>
          <div id="ri-err" style="color:#b03030;font-size:11px;margin-top:6px;display:none;">اسم المستخدم أو كلمة المرور غير صحيحة</div>
          <button onclick="doInlineLogin()" style="width:100%;margin-top:16px;padding:12px;background:linear-gradient(90deg,#1a3a6b,#8b1a1a);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;">دخول</button>
        </div>
      </div>`;
      document.getElementById('ri-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doInlineLogin();});
    }
  }

  window.doInlineLogin = function(){
    const u=document.getElementById('ri-user').value.trim();
    const p=document.getElementById('ri-pass').value;
    const usersObj=(window.USERS&&Object.keys(window.USERS).length>0)?window.USERS:USERS;
    if(usersObj[u]&&usersObj[u]===p){
      localStorage.setItem('3com_user',u);
      localStorage.setItem('3com_tab','dashboard');
      location.reload();
    } else {
      document.getElementById('ri-err').style.display='block';
    }
  };

  // انتظر Firebase — كل 300ms لمدة 15 ثانية
  let waited = 0;
  const MAX_WAIT = 15000;
  const INTERVAL = 300;

  const timer = setInterval(()=>{
    waited += INTERVAL;

    const usersObj = (window.USERS&&Object.keys(window.USERS).length>0)?window.USERS:USERS;
    const userValid = usersObj[savedUser] !== undefined;
    const fbReady = window.__sbConnected === true;

    // حدّث رسالة التحميل
    const msgEl = document.getElementById('load-msg');
    if(msgEl){
      if(waited < 3000) msgEl.textContent = 'جاري الاتصال بقاعدة البيانات...';
      else if(waited < 8000) msgEl.textContent = 'جاري تحميل البيانات... (' + Math.round(waited/1000) + 's)';
      else msgEl.textContent = 'الاتصال بطيء — يرجى الانتظار... (' + Math.round(waited/1000) + 's)';
    }

    if(userValid && fbReady){
      // ✅ كل شيء جاهز — ادخل
      clearInterval(timer);
      enterApp();
    } else if(userValid && waited >= MAX_WAIT){
      // ✅ اليوزر موجود بس Firebase بطيء — ادخل بدون بيانات وانتظر الـ snapshot
      clearInterval(timer);
      enterApp();
    } else if(!userValid && waited >= MAX_WAIT){
      // ❌ اليوزر مش موجود — اعرض شاشة الدخول
      clearInterval(timer);
      showLoginScreen();
    }
  }, INTERVAL);
})();
}); // DOMContentLoaded
</script>
